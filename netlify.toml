# Configurazione Netlify — sito statico, nessuna build.
# GitHub Pages ignora questo file, quindi il link github.io attuale continua a funzionare.

[build]
  publish = "."
  command = ""

# Apre l'app direttamente sulla home del sito (link corto),
# servendo il file esistente senza cambiarne il nome.
[[redirects]]
  from = "/"
  to = "/laurera15a40_11.html"
  status = 200
